info:
  name: Change password (logged-in user)
  type: http
  seq: 3
  tags:
    - Auth

http:
  method: POST
  url: "{{baseUrl}}/api/auth/change-password"
  body:
    type: json
    data: |-
      {
        "currentPassword": "OldPassword123!",
        "newPassword": "NewPassword456!"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Password updated successfully
    request:
      url: "{{baseUrl}}/api/auth/change-password"
      method: POST
      body:
        type: json
        data: |-
          {
            "currentPassword": "OldPassword123!",
            "newPassword": "NewPassword456!"
          }
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""
  - name: 400 Response
    description: Validation error or incorrect current password
    request:
      url: "{{baseUrl}}/api/auth/change-password"
      method: POST
      body:
        type: json
        data: |-
          {
            "currentPassword": "OldPassword123!",
            "newPassword": "NewPassword456!"
          }
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 401 Response
    description: Not authorized
    request:
      url: "{{baseUrl}}/api/auth/change-password"
      method: POST
      body:
        type: json
        data: |-
          {
            "currentPassword": "OldPassword123!",
            "newPassword": "NewPassword456!"
          }
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
