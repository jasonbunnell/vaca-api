info:
  name: Log in
  type: http
  seq: 1
  tags:
    - Auth

http:
  method: POST
  url: "{{baseUrl}}/api/auth/login"
  body:
    type: json
    data: |-
      {
        "email": "jason.bunnell@gmail.com",
        "password": "L3K5@Ri%d%5Jz!"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful login
    request:
      url: "{{baseUrl}}/api/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "jane@example.com",
            "password": "MySecurePassword123!"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "token": "",
            "user": {
              "_id": "664b1e2f9a1c2b3d4e5f6789",
              "firstName": "Jane",
              "lastName": "Doe",
              "name": "Jane Doe",
              "email": "jane@example.com",
              "phone": "+1-555-123-4567",
              "role": "host",
              "createdAt": "",
              "updatedAt": ""
            }
          }
  - name: 400 Response
    description: Missing fields
    request:
      url: "{{baseUrl}}/api/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "jane@example.com",
            "password": "MySecurePassword123!"
          }
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 401 Response
    description: Invalid credentials
    request:
      url: "{{baseUrl}}/api/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "jane@example.com",
            "password": "MySecurePassword123!"
          }
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
