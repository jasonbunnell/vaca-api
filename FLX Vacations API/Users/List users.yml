info:
  name: List users
  type: http
  seq: 1
  tags:
    - Users

http:
  method: GET
  url: "{{baseUrl}}/api/users"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: List of users
    request:
      url: "{{baseUrl}}/api/users"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "_id": "664b1e2f9a1c2b3d4e5f6789",
              "firstName": "Jane",
              "lastName": "Doe",
              "name": "Jane Doe",
              "email": "jane@example.com",
              "phone": "+1-555-123-4567",
              "role": "host",
              "createdAt": "",
              "updatedAt": ""
            }
          ]
  - name: 401 Response
    description: Not authorized
    request:
      url: "{{baseUrl}}/api/users"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
  - name: 403 Response
    description: Forbidden (requires admin)
    request:
      url: "{{baseUrl}}/api/users"
      method: GET
    response:
      status: 403
      statusText: Forbidden
      body:
        type: text
        data: ""
