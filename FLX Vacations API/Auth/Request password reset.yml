info:
  name: Request password reset
  type: http
  seq: 4
  tags:
    - Auth

http:
  method: POST
  url: "{{baseUrl}}/api/auth/forgot-password"
  body:
    type: json
    data: |-
      {
        "email": "jane@example.com"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Reset requested (token returned only in dev)
    request:
      url: "{{baseUrl}}/api/auth/forgot-password"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "jane@example.com"
          }
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""
  - name: 400 Response
    description: Missing email
    request:
      url: "{{baseUrl}}/api/auth/forgot-password"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "jane@example.com"
          }
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 404 Response
    description: No user with that email
    request:
      url: "{{baseUrl}}/api/auth/forgot-password"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "jane@example.com"
          }
    response:
      status: 404
      statusText: Not Found
      body:
        type: text
        data: ""
