info:
  name: Update property
  type: http
  seq: 5
  tags:
    - Properties

http:
  method: PUT
  url: "{{baseUrl}}/api/properties/:id"
  headers:
    - name: Authorization
      value: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjY5YjJiMDlmYTg1YmExOWZlZjg0MDAxOCIsInJvbGUiOiJhZG1pbiIsImlhdCI6MTc3MzQyNjY2OCwiZXhwIjoxNzc2MDE4NjY4fQ.rdpBd_2CgNMrsxpLs-zUiRm4NcyyMv4TMDe83mJwzn4
  params:
    - name: id
      value: 698e7a44750bbd787627ee73
      type: path
  body:
    type: json
    data: |-
      {
        "lake": "Seneca Lake"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

