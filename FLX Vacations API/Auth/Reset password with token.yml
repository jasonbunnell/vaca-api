info:
  name: Reset password with token
  type: http
  seq: 5
  tags:
    - Auth

http:
  method: POST
  url: "{{baseUrl}}/api/auth/reset-password"
  body:
    type: json
    data: |-
      {
        "token": "c4f9b6c2e1...",
        "newPassword": "NewPassword456!"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Password reset successfully
    request:
      url: "{{baseUrl}}/api/auth/reset-password"
      method: POST
      body:
        type: json
        data: |-
          {
            "token": "c4f9b6c2e1...",
            "newPassword": "NewPassword456!"
          }
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""
  - name: 400 Response
    description: Invalid or expired token, or validation error
    request:
      url: "{{baseUrl}}/api/auth/reset-password"
      method: POST
      body:
        type: json
        data: |-
          {
            "token": "c4f9b6c2e1...",
            "newPassword": "NewPassword456!"
          }
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
